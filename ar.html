<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife AR | Your Virtual Pet Mirror</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ar.css">

    <!-- StyleLife Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ar.css">

    <!-- MediaPipe Legacy Solutions (Local-Friendly IIFE) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- Three.js 3D Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.154.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <!-- Main Navigation (Minimal for AR) -->
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-scroll"></i></div>
            <span>StyleLife</span>
        </a>
        
        <div class="navbar-links">
            <a href="feed.html">PetScroll Feed</a>
            <a href="duty.html">Pet Duty</a>
            <a href="ar.html" class="active">Pet Mirror (AR)</a>
            <a href="world.html">Open World</a>
        </div>
        
        <div class="navbar-actions">
            <button class="btn btn-secondary btn-sm" id="ar-exit-btn">Exit AR</button>
            <a href="profile.html" class="nav-avatar" id="nav-user-avatar">U</a>
        </div>
    </nav>

    <main class="ar-page">
        <div class="ar-layout">
            <!-- Camera View -->
            <div class="ar-camera-wrap" id="ar-camera-wrap">
                <video id="ar-video" autoplay playsinline></video>
                <canvas id="ar-canvas"></canvas>
                
                <div class="ar-status-bar" id="ar-status-bar">
                    <span class="ar-recording-dot"></span>
                    <span id="ar-status-text">Pet Mirror Active</span>
                </div>

                <!-- Pet Status HUD -->
                <div class="pet-status-hud" id="pet-status-hud">
                    <div class="stat-bar-item">
                        <i class="fas fa-heart text-red"></i>
                        <div class="stat-progress-bg"><div class="stat-progress" id="stat-health" style="width: 100%;"></div></div>
                    </div>
                    <div class="stat-bar-item">
                        <i class="fas fa-utensils text-orange"></i>
                        <div class="stat-progress-bg"><div class="stat-progress" id="stat-hunger" style="width: 80%;"></div></div>
                    </div>
                    <div class="stat-bar-item">
                        <i class="fas fa-soap text-blue"></i>
                        <div class="stat-progress-bg"><div class="stat-progress" id="stat-hygiene" style="width: 90%;"></div></div>
                    </div>
                </div>
                
                <!-- Overlay Flash Effect -->
                <div class="ar-flash" id="ar-flash"></div>
                
                <!-- Pet Care Controls -->
                <div class="ar-controls">
                    <div class="ar-side-btns">
                        <div class="ar-icon-btn pet-action-btn" id="feed-pet-btn" title="Feed Pet">
                            <i class="fas fa-cookie-bite"></i>
                        </div>
                        <div class="ar-icon-btn pet-action-btn" id="bathe-pet-btn" title="Bathe Pet">
                            <i class="fas fa-shower"></i>
                        </div>
                    </div>
                    
                    <button class="ar-capture-btn" id="ar-capture-btn" title="Capture Snapshot">
                        <i class="fas fa-camera"></i>
                    </button>
                    
                    <div class="ar-side-btns">
                        <div class="ar-icon-btn" id="open-world-jump" title="Go to Open World">
                            <i class="fas fa-globe-americas"></i>
                        </div>
                        <div class="ar-icon-btn" id="ar-settings-btn" title="Pet Settings">
                            <i class="fas fa-cog"></i>
                        </div>
                    </div>
                </div>

                <!-- Calibration Overlay -->
                <div class="ar-calibration-overlay" id="ar-calibration">
                    <div class="ar-loading-spinner"></div>
                    <div class="ar-calibration-text" id="ar-cal-text">Finding your Pet...</div>
                    <div class="ar-calibration-sub" id="ar-cal-sub">Wait for the AR Portal to open</div>
                    <div id="ar-debug-log" style="font-family: monospace; font-size: 0.7rem; color: var(--text-muted); margin-top: 15px; max-width: 80%; text-align: center;"></div>
                </div>

                <!-- No Camera State Overlay -->
                <div class="ar-no-camera" id="ar-no-camera" style="display: none;">
                    <div class="no-cam-icon"><i class="fas fa-video-slash"></i></div>
                    <h3>Camera Access Required</h3>
                    <p>To use the StyleScroll AR Mirror, please grant camera permissions in your browser.</p>
                    <button class="btn btn-primary btn-sm" id="request-camera-btn">Enable Camera</button>
                </div>
            </div>

            <!-- Sidebar: Pet Adoption -->
            <aside class="ar-sidebar">
                <div class="ar-sidebar-header">Choose Your Pet</div>
                
                <div class="ar-category-pills">
                    <div class="ar-cat-pill active" data-cat="mythical"><i class="fas fa-dragon"></i> Mythical</div>
                    <div class="ar-cat-pill" data-cat="real"><i class="fas fa-dog"></i> Real</div>
                    <div class="ar-cat-pill" data-cat="cyber"><i class="fas fa-microchip"></i> Cyber</div>
                </div>
                
                <div class="ar-item-list" id="ar-item-list">
                    <!-- Pets Populated by JS -->
                </div>
            </aside>
        </div>
    </main>

    <!-- Post Capture Modal -->
    <div class="modal-overlay" id="capture-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Snapshot Captured!</h3>
                <button class="modal-close" id="close-modal-btn"><i class="fas fa-times"></i></button>
            </div>
            <div style="width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 20px;">
                <img src="" id="captured-preview" style="width: 100%; display: block; border-radius: 12px;">
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary btn-sm" style="flex: 1;" id="download-capture-btn">Download</button>
                <button class="btn btn-primary btn-sm" style="flex: 1;" id="post-capture-btn">Create Post</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/ar.js"></script>
</body>
</html>

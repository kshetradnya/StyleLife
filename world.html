<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetWorld | Explore the Open World</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.154.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        body, html { margin: 0; overflow: hidden; background: #88ccff; }
        #world-canvas { width: 100vw; height: 100vh; display: block; }
        .world-ui {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 20px;
            width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .controls-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        .mini-map {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: #eee;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
            z-index: 100;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-paw"></i></div>
            <span>PetLife</span>
        </a>
        <div class="navbar-links">
            <a href="feed.html">PetScroll</a>
            <a href="duty.html">Pet Duty</a>
            <a href="ar.html">Pet Mirror</a>
            <a href="world.html" class="active">Open World</a>
        </div>
        <div class="navbar-actions">
            <button class="btn btn-secondary btn-sm" onclick="startRace()">Enter Race <i class="fas fa-flag-checkered"></i></button>
        </div>
    </nav>

    <div class="world-ui">
        <h3 id="pet-name-world">My Active Pet</h3>
        <p id="pet-id-world" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 15px;">No Pet Adopted</p>
        <div style="display: flex; gap: 8px;">
            <div style="flex:1; height: 6px; background:#ddd; border-radius:3px;"><div id="world-health" style="height:100%; width:80%; background:#48C9A3; border-radius:3px;"></div></div>
            <div style="flex:1; height: 6px; background:#ddd; border-radius:3px;"><div id="world-hunger" style="height:100%; width:60%; background:#FF7E67; border-radius:3px;"></div></div>
        </div>
    </div>

    <div class="mini-map" id="minimap"></div>
    <div class="controls-hint">Use <b>WASD</b> to move your Pet across the 3D World</div>

    <canvas id="world-canvas"></canvas>

    <script>
        const canvas = document.getElementById("world-canvas");
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88ccff);
        scene.fog = new THREE.FogExp2(0x88ccff, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x48C9A3, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid/Environment Objects
        for(let i=0; i<30; i++) {
            const tree = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2, 8), new THREE.MeshStandardMaterial({color: 0x2d3436}));
            tree.position.set(Math.random()*100-50, 1, Math.random()*100-50);
            tree.castShadow = true;
            scene.add(tree);
        }

        // Active Pet Logic
        const activePetId = localStorage.getItem("petlife_active_id");
        let petMesh = new THREE.Group();
        
        if (activePetId) {
            const raw = localStorage.getItem(`petlife_stats_${activePetId}`);
            if (raw) {
                const stats = JSON.parse(raw);
                if (stats.dead) window.location.href = "ar.html";
                
                // Procedural Pet
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({color: 0xffaa00}));
                body.castShadow = true;
                petMesh.add(body);
                const eyes = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x000000}));
                eyes.position.set(0.15, 0.2, 0.3); petMesh.add(eyes);
            }
        }
        scene.add(petMesh);
        petMesh.position.y = 0.5;
        camera.position.set(0, 5, 10);
        camera.lookAt(petMesh.position);

        // Player Controls
        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        function animate() {
            if (keys['w']) petMesh.translateZ(-0.2);
            if (keys['s']) petMesh.translateZ(0.2);
            if (keys['a']) petMesh.rotation.y += 0.05;
            if (keys['d']) petMesh.rotation.y -= 0.05;

            // Camera Chase
            const offset = new THREE.Vector3(0, 5, 10).applyQuaternion(petMesh.quaternion);
            camera.position.lerp(petMesh.position.clone().add(offset), 0.1);
            camera.lookAt(petMesh.position);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        function startRace() {
            alert("🏎️ RACE MODE ACTIVATED! Reach the marker in 30 seconds!");
            const marker = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 10), new THREE.MeshBasicMaterial({color: 0xffd93d, transparent:true, opacity:0.6}));
            marker.position.set(20, 5, -50);
            scene.add(marker);
        }

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
